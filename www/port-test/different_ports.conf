# Port 평가용 설정 (location 포함 - 실제로 사이트가 떠야 하므로 필수)
#   8080 : 메인 사이트 (./www, "webserv test page") + 같은 포트에 가상호스트
#   8081 : 정적 사이트 (./www/static, "STATIC PAGE")
# 기존 repo www/ 를 재사용하므로 추가 파일 불필요.

# [A] 8080 -> 메인 사이트 (server_name 매칭 안 되면 이 블록이 기본/fallback)
server {
    listen 8080;
    server_name site_a.local;
    root ./www;
    index index.html;
    error_page 404 /errors/404.html;

    location / {
        root ./www;
        index index.html;
        autoindex off;
        allow_methods GET POST DELETE;
    }

    location /listing {
        root ./www/listing;
        autoindex on;
        allow_methods GET;
    }
}

# [B] 8081 -> 정적 사이트 (다른 포트 = 다른 웹사이트)
server {
    listen 8081;
    server_name site_b.local;
    root ./www/static;
    index index.html;

    location / {
        root ./www/static;
        index index.html;
        autoindex off;
        allow_methods GET;
    }
}

# [C] 8080 위 가상호스트 (같은 ip:port, 다른 server_name = 정상)
#     Host: virtual.local 일 때만 이 블록이 응답
server {
    listen 8080;
    server_name virtual.local;
    root ./www/static;
    index index.html;

    location / {
        root ./www/static;
        index index.html;
        autoindex off;
        allow_methods GET;
    }
}