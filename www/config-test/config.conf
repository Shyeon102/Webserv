# Configuration 전체 시연용
#   8080 : 메인(site_a.local) - 라우트/메서드/에러페이지/바디제한 데모
#   8080 : 가상호스트(virtual.local) - 같은 포트 다른 hostname
#   8081 : 다른 포트 다른 콘텐츠

# [A] 8080 메인 (가상호스트 A)
server {
    listen 8080;
    server_name site_a.local;
    root ./www;
    index index.html;
    client_max_body_size 100;          # 일부러 작게 -> 100바이트 초과 POST는 413
    error_page 404 /errors/404.html;   # 커스텀 404
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;

    location / {
        root ./www;
        index index.html;              # 디렉토리 요청 -> index.html
        autoindex off;
        allow_methods GET POST;        # DELETE 미허용 -> 405
    }

    location /listing {                 # 다른 디렉토리 + autoindex
        root ./www/listing;
        autoindex on;
        allow_methods GET;
    }

    location /static {                  # 또 다른 디렉토리 + index
        root ./www/static;
        index index.html;
        autoindex off;
        allow_methods GET;
    }

    location /upload/ {                 # DELETE 허용 route
        root ./www/uploads;
        autoindex off;
        allow_methods GET POST DELETE;
        upload_store ./www/uploads;
    }
}

# [B] 8080 가상호스트 B (같은 포트, 다른 hostname)
server {
    listen 8080;
    server_name virtual.local;
    root ./www/static;
    index index.html;

    location / {
        root ./www/static;
        index index.html;
        allow_methods GET;
    }
}

# [C] 8081 다른 포트 다른 콘텐츠
server {
    listen 8081;
    server_name site_b.local;
    root ./www/static;
    index index.html;

    location / {
        root ./www/static;
        index index.html;
        allow_methods GET;
    }
}