server {
    listen 8080;
    server_name main;
    root ./tests/demo_www;
    index index.html;
    client_max_body_size 1000000;
    error_page 404 /errors/404.html;
    location / {
        allow_methods GET POST DELETE;
        autoindex off;
    }
    location /cgi-bin {
        allow_methods GET POST;
        cgi_pass .py /usr/bin/python3;
    }
}
server {
    listen 8081;
    server_name second;
    root ./tests/demo_www;
    index index.html;
    location / {
        allow_methods GET;
    }
}

server {
    listen 8082;
    server_name first.com;
    root ./tests/demo_www;
    index index.html;
    location / { allow_methods GET; }
}
server {
    listen 8082;
    server_name second.com;
    root ./tests/vhost2;
    index index.html;
    location / { allow_methods GET; }
}
