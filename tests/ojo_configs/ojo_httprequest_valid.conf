server {
    listen 8090;
    root ./tests/demo_www;

    client_max_body_size 1048576;
    methods GET POST DELETE;
    allow_methods GET POST DELETE;

    location / {
        index index.html;
        allow_methods GET;
    }

    location /upload {
        allow_methods POST;
        upload_store /tmp/webserv_uploads;
    }

    location /files {
        allow_methods DELETE;
    }
}
