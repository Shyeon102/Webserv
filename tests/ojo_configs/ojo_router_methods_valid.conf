server {
    listen 8080;
    root ./tests/demo_www;

    methods GET POST DELETE;
    allow_methods GET POST DELETE;

    location / {
        index index.html index.htm;
        allow_methods GET;
    }

    location /api {
        methods GET POST DELETE;
        allow_methods GET POST;
    }

    location /api/admin {
        allow_methods GET DELETE;
        autoindex off;
    }
}
