server {
    listen 8080;
    server_name localhost;
    root ./www;
    index index.html;
    client_max_body_size 10485760;
    autoindex off;
    allow_methods GET POST DELETE;

    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    location / {
        root ./www;
        index index.html;
        autoindex off;
        allow_methods GET POST;
        cgi_pass .php /usr/bin/python3;
    }

    location /test {
        root ./www/test;
        autoindex on;
        allow_methods GET;
    }

    location /images {
        root ./www/images;
        autoindex on;
        allow_methods GET;
    }

    location /ychunschae {
        root ./www/ychunschae;
        index index.html;
        autoindex off;
        allow_methods GET;
    }

    location /static {
        root ./www/static;
        index index.html;
        autoindex off;
        allow_methods GET;
    }

    location /listing {
        root ./www/listing;
        autoindex on;
        allow_methods GET;
    }

    location /noindex {
        root ./www/listing;
        autoindex off;
        allow_methods GET;
    }

    location /upload/ {
        root ./www/uploads;
        autoindex off;
        allow_methods GET POST DELETE;
        upload_store ./www/uploads;
    }

    location /method {
        root ./www;
        index index.html;
        autoindex off;
        allow_methods GET;
    }

    location /redirection/42-intra {
        return 302 https://intra.42.fr/;
        allow_methods GET;
    }

    location /redirection/nginx/ {
        return 302 https://nginx.org/;
        allow_methods GET;
    }

    location /redirection/google {
        return 302 https://www.google.com/;
        allow_methods GET;
    }

    location /redirect/42-intra {
        return 302 https://intra.42.fr/;
        allow_methods GET;
    }
}
